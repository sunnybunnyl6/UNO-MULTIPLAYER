<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uno Local Link</title>
    <!-- Load Socket.io Client -->
    <script src="https://socket.io"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --ios-blur: blur(20px);
            --ios-glass: rgba(255, 255, 255, 0.07);
            --ios-border: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-color: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --success-gradient: linear-gradient(135deg, #10b981 0%, #047857 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            padding: 20px;
            overflow-x: hidden;
        }

        /* Fluid glassmorphic app wrapper */
        .app-container {
            width: 100%;
            max-width: 440px;
            background: var(--ios-glass);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--ios-border);
            border-radius: 38px; /* Elegant iOS curved corners */
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-mark {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 400;
        }

        /* Modern iOS form element wrapping */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 14px 16px;
            color: white;
            font-size: 1rem;
            font-weight: 400;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.35);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        /* Interactive Action Buttons */
        .btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.97); /* Micro-haptic feedback feel */
            opacity: 0.9;
        }

        .btn-primary {
            background: var(--accent-gradient);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            margin-bottom: 14px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--ios-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .divider {
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            font-weight: 700;
            margin: 20px 0;
            position: relative;
        }

        /* Lobby Display State */
        .lobby-view {
            display: none; /* hidden until room created/joined */
        }

        .room-badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px dashed var(--ios-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .room-code-text {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #10b981;
            margin-top: 4px;
        }

        /* Modern List Rendering */
        .player-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.3s ease out;
        }

        .player-avatar {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-pill {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- START LOBBY GATE -->
        <div id="authPanel">
            <header>
                <div class="logo-mark">UNO.io</div>
                <p>Real-time premium multiplayer card engine</p>
            </header>

            <div class="input-group">
                <label for="nameInput">Your Identity</label>
                <input id="nameInput" type="text" placeholder="Enter display name" autocomplete="off"/>
            </div>

            <button class="btn btn-primary" onclick="createRoom()">
                Create New Match
            </button>

            <div class="divider">OR JOIN EXISTING</div>

            <div class="input-group">
                <label for="codeInput">Passcode</label>
                <input id="codeInput" type="text" placeholder="4-LETTER CODE" style="text-transform: uppercase; text-align: center; letter-spacing: 2px;" maxlength="4" autocomplete="off"/>
            </div>

            <button class="btn btn-secondary" onclick="joinRoom()">
                Connect to Code
            </button>
        </div>

        <!-- ACTIVE LOBBY ROOM VIEW -->
        <div id="lobbyPanel" class="lobby-view">
            <header>
                <div class="logo-mark" style="font-size: 1.8rem;">Match Deck</div>
                <p>Waiting for players to synchronize...</p>
            </header>

            <div class="room-badge">
                <span style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary); font-weight: 600;">Share this Entry Key</span>
                <div id="displayCode" class="room-code-text">----</div>
            </div>

            <label>Connected Members</label>
            <div id="playerList" style="margin-bottom: 24px;">
                <!-- Dynamically populated -->
            </div>

            <button class="btn" style="background: var(--success-gradient); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);">
                Start Game Engine
            </button>
        </div>
    </div>

    <script>
        // Connect Frontend to Backend Server Instance
        const socket = io('http://localhost:3001');

        function createRoom() {
            const name = document.getElementById('nameInput').value.trim() || 'Player';
            socket.emit('create_room', name);
        }

        function joinRoom() {
            const name = document.getElementById('nameInput').value.trim() || 'Player';
            const code = document.getElementById('codeInput').value.trim();
            if(!code) return alert("Please input a room code.");
            socket.emit('join_room', { roomCode: code, playerName: name });
        }

        socket.on('room_created', (data) => {
            switchToLobbyView();
            document.getElementById('displayCode').innerText = data.roomCode;
            updatePlayerList(data.players);
        });

        socket.on('room_updated', (data) => {
            switchToLobbyView();
            updatePlayerList(data.players);
        });

        socket.on('error_message', (msg) => {
            alert(msg);
        });

        function switchToLobbyView() {
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('lobbyPanel').style.display = 'block';
        }

function updatePlayerList(players) {
    const container = document.getElementById('playerList');
    container.innerHTML = '';
    
    players.forEach(p => {
        const initial = p.name.charAt(0).toUpperCase();
        const card = document.createElement('div');
        card.className = 'player-card';
        
        // Added the missing backticks below to correctly parse the string template
        card.innerHTML = `
            <div class="player-info"> 
                <div class="player-avatar">${initial}</div> 
                <span style="font-weight: 500;">${p.name}</span> 
            </div> 
            <span class="status-pill">Ready</span>
        `;
        
        container.appendChild(card);
    });
}
